<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Random Password Generator</h1> <br><br>
    <div class="container">
        <label for="length">Password Length:</label>
        <input type="number" id="length" min="4" max="20" value="12">
        
        <div class="options">
            <label><input type="checkbox" id="includeUppercase" checked> Include Uppercase Letters</label><br>
            <label><input type="checkbox" id="includeLowercase" checked> Include Lowercase Letters</label><br>
            <label><input type="checkbox" id="includeNumbers" checked> Include Numbers</label><br>
            <label><input type="checkbox" id="includeSymbols"> Include Symbols</label><br>
        </div>

        <button id="generateBtn" onclick="generatePassword()">Generate Password</button>
        <p id="errorMessage"></p>
        <div id="passwordDisplay">aB1@$fG</div>

    <script src="index.js"></script>
</body>
</html>

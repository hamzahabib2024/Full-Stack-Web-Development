<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Conversion Program</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="">
        <h1> Temperature Conversion: </h1>
        <input type="number" id="textBox" value="0" placeholder="Enter temperature"><br>

        <input type="radio" id="tofahrenheit" name="unit">
        <label for="tofahrenheit">Celsius -> Fahrenheit</label><br>

        <input type="radio" id="tocelcius" name="unit">
        <label for="tocelcius">Fahrenheit -> Celsius</label><br><br>

        <button type="button" onclick="convert()" >submit</button>
        <p id="result"> </p>
    </form>

    <script src="index.js"></script>
</body>
</html>
